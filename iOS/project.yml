name: Knifeledger
options:
  bundleIdPrefix: com.shimondeitel.knifecare
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Knifeledger:
    type: application
    platform: iOS
    sources:
      - path: Knifeledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.knifecare
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Knifeledger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  KnifeledgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KnifeledgerTests
      - path: Knifeledger.storekit
    dependencies:
      - target: Knifeledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.knifecare.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  KnifeledgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KnifeledgerUITests
    dependencies:
      - target: Knifeledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.knifecare.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Knifeledger:
    build:
      targets:
        Knifeledger: all
        KnifeledgerTests: [test]
        KnifeledgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Knifeledger.storekit
    test:
      config: Debug
      storeKitConfiguration: Knifeledger.storekit
      targets:
        - KnifeledgerTests
        - KnifeledgerUITests
    archive:
      config: Release
